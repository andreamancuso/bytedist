<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByteDist Embedded Payload Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(42rem, calc(100vw - 2rem));
      }

      img {
        width: 96px;
        height: 96px;
        image-rendering: pixelated;
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
      }

      pre {
        overflow: auto;
        padding: 0.75rem;
        background: color-mix(in srgb, CanvasText 8%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ByteDist embedded payload</h1>
      <p id="message">Loading payload...</p>
      <img id="image" alt="Embedded payload image" />
      <pre id="metadata"></pre>
    </main>

    <script type="module">
      const PAYLOAD_SELECTOR =
        'script[type="application/octet-stream+base64"][data-bytedist-payload]';
      const textDecoder = new TextDecoder();

      try {
        const payload = readEmbeddedPayload();
        const archive = openPayload(payload);
        const manifest = JSON.parse(readText(archive, "manifest.json"));
        const metadata = JSON.parse(readText(archive, manifest.data));
        const imageBytes = readBytes(archive, manifest.image);
        const imageType = archive.chunks.get(manifest.image)?.mime ?? "application/octet-stream";
        const imageUrl = URL.createObjectURL(new Blob([imageBytes], { type: imageType }));

        document.title = manifest.title;
        document.querySelector("#message").textContent = readText(archive, manifest.text);
        document.querySelector("#metadata").textContent = JSON.stringify(metadata, null, 2);
        document.querySelector("#image").src = imageUrl;
        window.addEventListener("pagehide", () => URL.revokeObjectURL(imageUrl), { once: true });
      } catch (error) {
        document.querySelector("#message").textContent =
          error instanceof Error ? error.message : String(error);
      }

      function readEmbeddedPayload() {
        const element = document.querySelector(PAYLOAD_SELECTOR);
        if (!element) {
          throw new Error("Embedded ByteDist payload was not found.");
        }

        return decodeBase64(element.textContent ?? "");
      }

      function openPayload(bytes) {
        assertAscii(bytes.subarray(0, 8), "BDISTPAY", "Invalid ByteDist header magic.");

        const footerOffset = bytes.byteLength - 40;
        assertAscii(bytes.subarray(footerOffset, footerOffset + 8), "BDISTEND", "Invalid footer.");

        const footer = new DataView(bytes.buffer, bytes.byteOffset + footerOffset, 40);
        const tocOffset = Number(footer.getBigUint64(12, true));
        const tocLength = Number(footer.getBigUint64(20, true));
        const payloadLength = Number(footer.getBigUint64(28, true));

        if (payloadLength !== bytes.byteLength) {
          throw new Error("ByteDist payload length mismatch.");
        }

        const tocBytes = bytes.slice(tocOffset, tocOffset + tocLength);
        const toc = JSON.parse(textDecoder.decode(tocBytes));
        return {
          bytes,
          toc,
          chunks: new Map(toc.chunks.map((chunk) => [chunk.name, chunk]))
        };
      }

      function readText(archive, name) {
        return textDecoder.decode(readBytes(archive, name));
      }

      function readBytes(archive, name) {
        const chunk = archive.chunks.get(name);
        if (!chunk) {
          throw new Error(`Missing ByteDist chunk: ${name}`);
        }

        return archive.bytes.slice(chunk.offset, chunk.offset + chunk.storedLength);
      }

      function decodeBase64(text) {
        const binary = atob(text.replace(/\s+/g, ""));
        const bytes = new Uint8Array(binary.length);

        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }

        return bytes;
      }

      function assertAscii(bytes, expected, message) {
        if (textDecoder.decode(bytes) !== expected) {
          throw new Error(message);
        }
      }
    </script>
